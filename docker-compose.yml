services:
  # 反向代理：对外 80，/ → frontend，/api → bff
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      bff:
        condition: service_healthy

  # 前端静态
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # 仅被 gateway 访问，不对外暴露

  # BFF 服务
  bff:
    build:
      context: .
      dockerfile: Dockerfile.bff
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
